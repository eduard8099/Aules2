<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aules - Generalitat Valenciana</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:white;
    color:#333;
}

/* ================= HERO ================= */

.hero{
    text-align:center;
    padding:50px 20px 30px;
}

.hero p{
    color:#666;
    margin-bottom:25px;
}

/* ================= GRID ================= */

.container{
    max-width:1100px;
    width:100%;
    margin:0 auto;
    padding:0 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(12, 1fr);
    gap:15px;
    margin-bottom:60px;
}

.card{
    border-radius:22px 0 22px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:16px;
    background-size:cover;
    background-position:center;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0);
    transition:background 0.3s ease;
    z-index:1;
}

.card:hover::before{
    background:rgba(0,0,0,0.45);
}

.card span,
.card{
    position:relative;
    z-index:2;
}

/* Alturas */

.infantil,
.primaria,
.eso,
.ceed,
.especiales,
.iseacv,
.profesorado,
.autoformacion,
.docente{
    height:140px;
}

.bachiller,
.fp,
.semipresencial,
.adultos{
    height:220px;
}

/* Columnas */

.infantil,
.eso,
.bachiller,
.fp,
.semipresencial,
.adultos,
.especiales,
.iseacv,
.profesorado,
.autoformacion{
    grid-column:span 3;
}

.primaria,
.ceed,
.docente{
    grid-column:span 6;
}

/* Imágenes */

.infantil{ background-image:url("infantil.png"); }
.primaria{ background-image:url("primaria.png"); }
.eso{ background-image:url("eso.png"); }
.bachiller{ background-image:url("bachiller.png"); }
.fp{ background-image:url("FP presencial.png"); }
.semipresencial{ background-image:url("Semipresencial.png"); }
.adultos{ background-image:url("Formacio adultos.png"); }
.ceed{ background-image:url("ceed.png"); }
.especiales{ background-image:url("Especiales.png"); }
.iseacv{ background-image:url("iseacv.png"); }
.profesorado{ background-image:url("profesorado.png"); }
.autoformacion{ background-image:url("autoformacion.png"); }
.docente{ background-image:url("docente.png"); }

/* ================= PROMO ================= */

.promo {
  max-width: 900px;
  margin: 0 auto 60px;
  background: #f7f8f9;
  border-radius: 12px;
  padding: 30px 30px;
  display: flex;
  align-items: center;
  gap: 120px;
}

.promo-logo {
  width: 250px;
  height: auto;
  flex-shrink: 0;
  margin-left: 50px;
}

.promo-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
  text-align: left;
}

.promo-text p {
  font-size: 14px;
  color: #555;
  margin: 0;
  font-weight: 500;
}

.promo-button {
  display: inline-block;
  background-color: #f0b400;
  color: white;
  padding: 10px 18px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  width: fit-content;
  transition: background-color 0.3s ease;
}

.promo-button:hover {
  background-color: #d49900;
}

.promo-icons {
  display: flex;
  gap: 20px;
  margin-top: 8px;
}

.promo-icons a img {
  width: 32px;
  height: 32px;
  filter: none;
  transition: filter 0.3s ease;
}

.promo-icons a:hover img {
  filter: brightness(1.2);
}

/* ================= FOOTER ================= */

footer{
    border-top:1px solid #ccc;
    text-align:center;
    padding:20px;
    font-size:12px;
    background:#f8f8f8;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 600px) {
  .promo {
    flex-direction: column;
    text-align: center;
    gap: 20px;
  }

  .promo-text {
    text-align: center;
    align-items: center;
  }

  .promo-icons {
    justify-content: center;
  }
}

@media(max-width:900px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

    .card{
        grid-column:span 2 !important;
    }

    .infantil,
    .primaria,
    .eso,
    .ceed,
    .especiales,
    .iseacv,
    .profesorado,
    .autoformacion,
    .docente{
        height:180px;
    }

    .bachiller,
    .fp,
    .semipresencial,
    .adultos{
        height:260px;
    }
}

</style>
</head>
